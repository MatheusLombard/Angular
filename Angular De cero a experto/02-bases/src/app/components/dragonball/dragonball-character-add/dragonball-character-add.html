<h3>Agregar: {{ name() }}</h3>
    <input
      type="text"
      class="form-control"
      placeholder="Nombre"
      [value]="name()"
      (input)="name.set(txtName.value)"
      #txtName
    />
    <input
      type="number"
      class="form-control"
      placeholder="Poder"
      [value]="power()"
      (change)="power.set(+inputPower.value)"
      #inputPower
    />

    <button class="mt-2 btn btn-outline-primary" (click)="addCharacter()">Agregar</button>
